<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Intelligent ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #ff3860;
    --c2: #3273dc;
    --c3: #23d160;
    --c4: #ffdd57;
    --c5: #ff6b35;
    --c6: #a855f7;
    --dark: #1a1a2e;
    --dark2: #16213e;
    --dark3: #0f3460;
    --white: #ffffff;
    --text-muted: rgba(255,255,255,0.65);
    --radius: 18px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── CONFETTI ───────────────────────────────────── */
  #confetti-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 1000;
  }

  /* ── SCREENS ────────────────────────────────────── */
  .screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER LOGO ────────────────────────────────── */
  .logo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: clamp(2.8rem, 8vw, 5rem);
    line-height: 1;
    text-align: center;
  }
  .logo span:nth-child(1) { color: var(--c1); }
  .logo span:nth-child(2) { color: var(--c4); }
  .logo span:nth-child(3) { color: var(--c3); }
  .logo span:nth-child(4) { color: var(--c2); }
  .logo span:nth-child(5) { color: var(--c6); }

  .logo-sub {
    text-align: center;
    font-size: 1.1rem;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* ── CARDS ──────────────────────────────────────── */
  .card {
    background: var(--dark2);
    border-radius: var(--radius);
    padding: 32px;
    width: 100%;
    max-width: 560px;
    border: 2px solid rgba(255,255,255,0.07);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  /* ── BUTTONS ────────────────────────────────────── */
  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    padding: 16px 36px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: var(--c3);
    color: #000;
    box-shadow: 0 6px 0 #17a347;
  }
  .btn-primary:hover { box-shadow: 0 4px 0 #17a347; transform: translateY(2px); }
  .btn-secondary {
    background: var(--c2);
    color: #fff;
    box-shadow: 0 6px 0 #1e5db0;
  }
  .btn-secondary:hover { box-shadow: 0 4px 0 #1e5db0; transform: translateY(2px); }
  .btn-danger {
    background: var(--c1);
    color: #fff;
    box-shadow: 0 6px 0 #c0183e;
  }
  .btn-block { width: 100%; justify-content: center; }

  /* ── INPUT ──────────────────────────────────────── */
  .input-group { margin-bottom: 20px; }
  .input-group label {
    display: block;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-muted);
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .input-group input {
    width: 100%;
    padding: 14px 18px;
    background: var(--dark3);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-sm);
    color: #fff;
    font-size: 1rem;
    font-family: 'Nunito Sans', sans-serif;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--c3);
  }

  /* ── HOME SCREEN ────────────────────────────────── */
  #screen-home .logo { margin-bottom: 8px; }
  #screen-home .card { margin-top: 40px; }
  .home-actions {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    margin-top: 8px;
  }

  /* ── CATEGORY SCREEN ────────────────────────────── */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-top: 20px;
  }
  .category-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    padding: 20px 16px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    color: #000;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .category-btn:hover { transform: translateY(-3px); }
  .category-btn:active { transform: scale(0.95); }
  .category-btn .cat-icon { font-size: 2rem; }
  .category-btn:nth-child(1) { background: var(--c4); box-shadow: 0 6px 0 #c9a800; }
  .category-btn:nth-child(2) { background: var(--c1); color: #fff; box-shadow: 0 6px 0 #b02040; }
  .category-btn:nth-child(3) { background: var(--c2); color: #fff; box-shadow: 0 6px 0 #1e5db0; }
  .category-btn:nth-child(4) { background: var(--c3); box-shadow: 0 6px 0 #17a347; }

  /* ── GAME SCREEN ────────────────────────────────── */
  #screen-game {
    justify-content: flex-start;
    padding-top: 0;
  }

  /* Top bar */
  .game-topbar {
    width: 100%;
    background: var(--dark2);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid rgba(255,255,255,0.07);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-score {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.5rem;
    color: var(--c4);
    display: flex; align-items: center; gap: 8px;
  }
  .topbar-info {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 700;
    text-align: center;
  }
  .topbar-streak {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.2rem;
    color: var(--c5);
  }

  /* Timer */
  .timer-wrap {
    width: 100%;
    max-width: 720px;
    padding: 0 24px;
    margin-top: 20px;
  }
  .timer-bar-bg {
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--c3), var(--c4));
    transition: width 0.25s linear, background 0.5s;
  }
  .timer-bar.urgent { background: linear-gradient(90deg, var(--c1), var(--c5)); }
  .timer-number {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    text-align: center;
    margin-top: 6px;
    color: var(--c4);
    transition: color 0.3s;
  }
  .timer-number.urgent { color: var(--c1); }

  /* Difficulty stars */
  .difficulty-wrap {
    display: flex; align-items: center; gap: 6px;
    justify-content: center;
    margin-top: 10px;
  }
  .diff-star {
    font-size: 1.3rem;
    transition: transform 0.3s;
  }
  .diff-star.active { filter: drop-shadow(0 0 6px gold); transform: scale(1.2); }
  .diff-label {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-left: 4px;
  }

  /* Question */
  .question-wrap {
    width: 100%;
    max-width: 720px;
    padding: 24px 24px 0;
  }
  .question-counter {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .question-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: clamp(1.2rem, 3vw, 1.7rem);
    line-height: 1.35;
    background: var(--dark2);
    border-radius: var(--radius);
    padding: 24px 28px;
    border: 2px solid rgba(255,255,255,0.07);
    min-height: 90px;
    display: flex;
    align-items: center;
  }

  /* Answers */
  .answers-grid {
    width: 100%;
    max-width: 720px;
    padding: 16px 24px 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .answer-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: clamp(0.9rem, 2vw, 1.05rem);
    padding: 20px 16px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: transform 0.12s, opacity 0.3s;
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .answer-btn:hover:not(:disabled) { transform: scale(1.03); }
  .answer-btn:active:not(:disabled) { transform: scale(0.97); }
  .answer-btn:disabled { cursor: default; }

  .answer-btn:nth-child(1) { background: #e83e4a; box-shadow: 0 6px 0 #9e1a28; }
  .answer-btn:nth-child(2) { background: #1368ce; box-shadow: 0 6px 0 #0a3d7a; }
  .answer-btn:nth-child(3) { background: #e6a817; box-shadow: 0 6px 0 #9a6e00; }
  .answer-btn:nth-child(4) { background: #26890c; box-shadow: 0 6px 0 #145000; }

  .answer-btn .ans-shape {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1rem;
  }

  .answer-btn.correct {
    background: #23d160 !important;
    box-shadow: 0 6px 0 #17a347 !important;
    animation: bounce 0.4s ease;
  }
  .answer-btn.wrong {
    background: #555 !important;
    box-shadow: 0 6px 0 #333 !important;
    opacity: 0.6;
  }
  .answer-btn.wrong-chosen {
    background: #ff3860 !important;
    box-shadow: 0 6px 0 #9e1a28 !important;
    animation: shake 0.4s ease;
  }

  @keyframes bounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.08); }
    70%  { transform: scale(0.96); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-8px); }
    40%     { transform: translateX(8px); }
    60%     { transform: translateX(-5px); }
    80%     { transform: translateX(5px); }
  }

  /* Feedback toast */
  .feedback-toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--dark2);
    border-radius: var(--radius);
    padding: 18px 32px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    display: flex; align-items: center; gap: 12px;
    white-space: nowrap;
    border: 2px solid rgba(255,255,255,0.1);
  }
  .feedback-toast.show { transform: translateX(-50%) translateY(0); }
  .feedback-toast.correct-toast { border-color: var(--c3); }
  .feedback-toast.wrong-toast   { border-color: var(--c1); }

  /* Points popup */
  .points-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 5rem;
    color: var(--c4);
    text-shadow: 0 0 40px rgba(255,221,87,0.6);
    pointer-events: none;
    z-index: 200;
    transition: transform 0.2s, opacity 0.5s;
  }
  .points-popup.show {
    transform: translate(-50%, -50%) scale(1);
    animation: popScore 0.8s forwards;
  }
  @keyframes popScore {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    40%  { transform: translate(-50%,-60%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%,-80%) scale(0.8); opacity: 0; }
  }

  /* ── RESULTS SCREEN ─────────────────────────────── */
  #screen-results .card { margin-top: 32px; }

  .result-emoji {
    font-size: 5rem;
    text-align: center;
    margin-bottom: 12px;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0); }
    to   { transform: scale(1); }
  }

  .result-score {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 4rem;
    text-align: center;
    color: var(--c4);
    line-height: 1;
  }
  .result-label {
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 6px;
    font-weight: 700;
  }

  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin: 24px 0;
  }
  .stat-box {
    background: var(--dark3);
    border-radius: var(--radius-sm);
    padding: 16px 10px;
    text-align: center;
  }
  .stat-box .stat-val {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.8rem;
  }
  .stat-box .stat-key {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-top: 4px;
  }
  .stat-box:nth-child(1) .stat-val { color: var(--c3); }
  .stat-box:nth-child(2) .stat-val { color: var(--c1); }
  .stat-box:nth-child(3) .stat-val { color: var(--c2); }

  .result-actions {
    display: flex; flex-direction: column; gap: 12px; margin-top: 8px;
  }

  /* ── LEADERBOARD ────────────────────────────────── */
  .leaderboard {
    width: 100%;
    max-width: 560px;
    margin-top: 20px;
  }
  .lb-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    text-align: center;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .lb-row {
    display: flex;
    align-items: center;
    background: var(--dark2);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    margin-bottom: 8px;
    border: 2px solid rgba(255,255,255,0.05);
    transition: transform 0.2s;
    animation: slideIn 0.3s ease both;
  }
  .lb-row:hover { transform: translateX(4px); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .lb-rank {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.2rem;
    width: 36px;
    color: var(--text-muted);
  }
  .lb-rank.gold   { color: #ffd700; }
  .lb-rank.silver { color: #c0c0c0; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-name {
    flex: 1;
    font-weight: 700;
    font-size: 1rem;
  }
  .lb-cat {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-right: 12px;
  }
  .lb-score {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    color: var(--c4);
    font-size: 1.1rem;
  }

  /* ── FLOATING PARTICLES BG ──────────────────────── */
  .bg-particles {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: float linear infinite;
  }
  @keyframes float {
    from { transform: translateY(110vh) rotate(0deg); }
    to   { transform: translateY(-10vh) rotate(720deg); }
  }

  /* ── RESPONSIVE ─────────────────────────────────── */
  @media (max-width: 500px) {
    .answers-grid { grid-template-columns: 1fr; }
    .category-grid { grid-template-columns: 1fr 1fr; }
    .result-stats { grid-template-columns: 1fr 1fr 1fr; }
  }

  /* ── UTILS ──────────────────────────────────────── */
  .mt-8  { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .text-center { text-align: center; }
  .text-muted { color: var(--text-muted); }
  h2 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.5rem;
    margin-bottom: 6px;
  }
  .section-sub {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 24px;
  }
</style>
</head>
<body>

<!-- Background particles -->
<div class="bg-particles" id="particles"></div>
<canvas id="confetti-canvas"></canvas>

<!-- Points popup -->
<div class="points-popup" id="points-popup">+30</div>

<!-- Feedback toast -->
<div class="feedback-toast" id="feedback-toast"></div>

<!-- ══════════════════════════════════════ -->
<!-- SCREEN: HOME                          -->
<!-- ══════════════════════════════════════ -->
<div class="screen active" id="screen-home">
  <div class="logo">
    <span>Q</span><span>U</span><span>I</span><span>Z</span><span>!</span>
  </div>
  <div class="logo-sub">Le quiz qui s'adapte à toi ⚡</div>

  <div class="card mt-24">
    <h2>Bienvenue !</h2>
    <p class="section-sub">Entre ton pseudo pour commencer</p>

    <div class="input-group">
      <label>Ton pseudo</label>
      <input type="text" id="player-name" placeholder="Ex: SuperQuizzer42" maxlength="20" />
    </div>

    <div class="home-actions">
      <button class="btn btn-primary" onclick="goToCategories()">
        ▶ Jouer
      </button>
      <button class="btn btn-secondary" onclick="showLeaderboard()">
        🏆 Classement
      </button>
    </div>
  </div>

  <!-- Mini leaderboard preview -->
  <div class="leaderboard" id="home-leaderboard" style="display:none">
    <div class="lb-title">🏆 Meilleurs scores</div>
    <div id="home-lb-rows"></div>
  </div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- SCREEN: CATEGORIES                    -->
<!-- ══════════════════════════════════════ -->
<div class="screen" id="screen-categories">
  <div class="logo" style="font-size:2.5rem">
    <span>C</span><span>H</span><span>O</span><span>I</span><span>S</span><span>!</span>
  </div>
  <div class="logo-sub">Quelle catégorie ?</div>

  <div class="card mt-24">
    <div class="category-grid" id="category-grid"></div>
    <button class="btn btn-secondary btn-block mt-16" onclick="goBack()">← Retour</button>
  </div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- SCREEN: GAME                          -->
<!-- ══════════════════════════════════════ -->
<div class="screen" id="screen-game">
  <!-- Top bar -->
  <div class="game-topbar">
    <div class="topbar-score">⭐ <span id="score-display">0</span></div>
    <div class="topbar-info">
      <div id="player-display"></div>
      <div id="category-display" style="color:var(--c4);font-size:0.8rem"></div>
    </div>
    <div class="topbar-streak" id="streak-display"></div>
  </div>

  <!-- Timer -->
  <div class="timer-wrap">
    <div class="difficulty-wrap" id="difficulty-display"></div>
    <div class="timer-bar-bg mt-8">
      <div class="timer-bar" id="timer-bar"></div>
    </div>
    <div class="timer-number" id="timer-number">10</div>
  </div>

  <!-- Question -->
  <div class="question-wrap">
    <div class="question-counter" id="question-counter">Question 1 / 5</div>
    <div class="question-text" id="question-text">Chargement...</div>
  </div>

  <!-- Answers -->
  <div class="answers-grid" id="answers-grid"></div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- SCREEN: RESULTS                       -->
<!-- ══════════════════════════════════════ -->
<div class="screen" id="screen-results">
  <div class="result-emoji" id="result-emoji">🏆</div>
  <div class="result-score" id="result-score">0</div>
  <div class="result-label">POINTS</div>

  <div class="card mt-16" style="max-width:480px;width:100%">
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val" id="res-correct">0</div>
        <div class="stat-key">Correctes</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="res-wrong">0</div>
        <div class="stat-key">Ratées</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="res-accuracy">0%</div>
        <div class="stat-key">Précision</div>
      </div>
    </div>

    <div id="rank-message" class="text-center mt-8 mb-16" style="font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;color:var(--c4)"></div>

    <div class="result-actions">
      <button class="btn btn-primary btn-block" onclick="replayGame()">🔁 Rejouer</button>
      <button class="btn btn-secondary btn-block" onclick="goToCategories()">🗂 Changer de catégorie</button>
      <button class="btn btn-block" style="background:var(--dark3);color:#fff" onclick="goHome()">🏠 Accueil</button>
    </div>
  </div>

  <div class="leaderboard" id="results-leaderboard">
    <div class="lb-title mt-16">🏆 Classement général</div>
    <div id="results-lb-rows"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
const QUESTIONS = {
  "Math": [
    { text: "Combien font 3 × 7 ?", choices: ["18","21","24","27"], answer: "21", diff: 1 },
    { text: "Quel est le résultat de 12 + 15 ?", choices: ["25","26","27","28"], answer: "27", diff: 1 },
    { text: "Combien font 8 × 9 ?", choices: ["63","72","81","64"], answer: "72", diff: 2 },
    { text: "Quelle est la racine carrée de 144 ?", choices: ["10","11","12","13"], answer: "12", diff: 2 },
    { text: "Combien font 17 × 13 ?", choices: ["201","211","221","231"], answer: "221", diff: 3 },
    { text: "Combien font 15² ?", choices: ["185","215","225","235"], answer: "225", diff: 3 },
  ],
  "Culture générale": [
    { text: "Quelle est la capitale de la France ?", choices: ["Lyon","Paris","Marseille","Bordeaux"], answer: "Paris", diff: 1 },
    { text: "Combien y a-t-il de continents sur Terre ?", choices: ["5","6","7","8"], answer: "7", diff: 1 },
    { text: "Quelle est la plus grande planète du système solaire ?", choices: ["Saturne","Neptune","Jupiter","Uranus"], answer: "Jupiter", diff: 2 },
    { text: "En quelle année a eu lieu la Révolution française ?", choices: ["1789","1799","1769","1815"], answer: "1789", diff: 2 },
    { text: "Quel est l'élément chimique dont le symbole est Au ?", choices: ["Argent","Aluminium","Or","Cuivre"], answer: "Or", diff: 3 },
    { text: "Quelle est la distance Terre-Lune (en km) ?", choices: ["284 000","384 000","484 000","184 000"], answer: "384 000", diff: 3 },
  ],
  "Programmation": [
    { text: "Que signifie HTML ?", choices: ["Hyper Text Markup Language","High Text Machine Language","Hyper Transfer Mode Language","Home Tool Markup Language"], answer: "Hyper Text Markup Language", diff: 1 },
    { text: "Quel symbole démarre un commentaire en C# ?", choices: ["#","//","/*","--"], answer: "//", diff: 1 },
    { text: "Quelle boucle s'exécute au moins une fois ?", choices: ["for","while","do-while","foreach"], answer: "do-while", diff: 2 },
    { text: "Qu'est-ce qu'une variable de type bool ?", choices: ["Un nombre entier","Un texte","Une valeur vrai ou faux","Une liste"], answer: "Une valeur vrai ou faux", diff: 2 },
    { text: "Quel mot-clé crée une classe en C# ?", choices: ["struct","class","object","type"], answer: "class", diff: 3 },
    { text: "Que signifie l'acronyme SQL ?", choices: ["Structured Query Language","Simple Queue Language","System Query Logic","Standard Query List"], answer: "Structured Query Language", diff: 3 },
  ],
  "Histoire": [
    { text: "Qui a découvert l'Amérique en 1492 ?", choices: ["Vasco de Gama","Amerigo Vespucci","Christophe Colomb","Magellan"], answer: "Christophe Colomb", diff: 1 },
    { text: "Quel empire a construit le Colisée ?", choices: ["Grec","Ottoman","Romain","Byzantin"], answer: "Romain", diff: 1 },
    { text: "En quelle année a débuté la Première Guerre mondiale ?", choices: ["1912","1914","1916","1918"], answer: "1914", diff: 2 },
    { text: "Quel pharaon a fait construire la grande pyramide de Gizeh ?", choices: ["Ramsès II","Toutânkhamon","Khéops","Néfertiti"], answer: "Khéops", diff: 2 },
    { text: "Quelle bataille a mis fin au Premier Empire de Napoléon ?", choices: ["Austerlitz","Waterloo","Trafalgar","Borodino"], answer: "Waterloo", diff: 3 },
    { text: "En quelle année fut signé le traité de Versailles ?", choices: ["1917","1918","1919","1920"], answer: "1919", diff: 3 },
  ]
};

const CATEGORY_ICONS = { "Math": "🔢", "Culture générale": "🌍", "Programmation": "💻", "Histoire": "🏛️" };
const SHAPES = ["▲","◆","●","■"];
const TIMER_MAX = 10;
const QUESTIONS_PER_GAME = 5;

// ── State ────────────────────────────────────────
let state = {
  player: "",
  category: "",
  score: 0,
  difficulty: 1,
  questionIdx: 0,
  correctCount: 0,
  wrongCount: 0,
  streak: 0,
  maxStreak: 0,
  answered: false,
  timerInterval: null,
  timeLeft: TIMER_MAX,
  usedQuestions: [],
  currentQuestion: null,
  lastCategory: ""
};

// ── Leaderboard (localStorage) ───────────────────
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem('quiz_lb') || '[]'); }
  catch { return []; }
}
function saveToLeaderboard(entry) {
  let lb = getLeaderboard();
  lb.push(entry);
  lb.sort((a,b) => b.score - a.score);
  lb = lb.slice(0, 10);
  localStorage.setItem('quiz_lb', JSON.stringify(lb));
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  clearTimer();
  showScreen('screen-home');
  showLeaderboard();
}

function goBack() { showScreen('screen-home'); }

function goToCategories() {
  const nameEl = document.getElementById('player-name');
  const name = nameEl ? nameEl.value.trim() : state.player;
  if (!name) { nameEl.focus(); nameEl.style.borderColor = 'var(--c1)'; return; }
  state.player = name;
  buildCategoryGrid();
  showScreen('screen-categories');
}

function showLeaderboard() {
  const lb = getLeaderboard();
  const wrap = document.getElementById('home-leaderboard');
  const rows = document.getElementById('home-lb-rows');
  if (lb.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  rows.innerHTML = lb.slice(0,5).map((e,i) => renderLbRow(e, i)).join('');
}

function renderLbRow(entry, idx) {
  const medals = ['gold','silver','bronze'];
  const rankClass = medals[idx] || '';
  const rankText = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx+1}`;
  return `<div class="lb-row" style="animation-delay:${idx*0.05}s">
    <div class="lb-rank ${rankClass}">${rankText}</div>
    <div class="lb-name">${entry.name}</div>
    <div class="lb-cat">${entry.category}</div>
    <div class="lb-score">${entry.score} pts</div>
  </div>`;
}

// ══════════════════════════════════════════════
// CATEGORIES
// ══════════════════════════════════════════════
function buildCategoryGrid() {
  const grid = document.getElementById('category-grid');
  const cats = Object.keys(QUESTIONS);
  grid.innerHTML = cats.map((cat, i) => `
    <button class="category-btn" onclick="startGame('${cat}')">
      <div class="cat-icon">${CATEGORY_ICONS[cat] || '❓'}</div>
      <div>${cat}</div>
    </button>
  `).join('');
}

// ══════════════════════════════════════════════
// GAME
// ══════════════════════════════════════════════
function startGame(category) {
  state = {
    ...state,
    category,
    score: 0,
    difficulty: 1,
    questionIdx: 0,
    correctCount: 0,
    wrongCount: 0,
    streak: 0,
    maxStreak: 0,
    answered: false,
    usedQuestions: [],
    currentQuestion: null,
    lastCategory: category
  };

  document.getElementById('player-display').textContent = state.player;
  document.getElementById('category-display').textContent = CATEGORY_ICONS[category] + ' ' + category;
  showScreen('screen-game');
  loadQuestion();
}

function replayGame() {
  startGame(state.lastCategory);
}

function loadQuestion() {
  if (state.questionIdx >= QUESTIONS_PER_GAME) { endGame(); return; }

  clearTimer();
  state.answered = false;
  state.timeLeft = TIMER_MAX;

  // Pick question for current difficulty
  const pool = QUESTIONS[state.category] || [];
  let candidates = pool.filter(q =>
    q.diff === state.difficulty &&
    !state.usedQuestions.includes(q.text)
  );

  // Fallback: any unused question
  if (candidates.length === 0) {
    candidates = pool.filter(q => !state.usedQuestions.includes(q.text));
  }

  if (candidates.length === 0) { endGame(); return; }

  const q = candidates[Math.floor(Math.random() * candidates.length)];
  state.usedQuestions.push(q.text);
  state.currentQuestion = q;

  // Update UI
  document.getElementById('score-display').textContent = state.score;
  document.getElementById('question-counter').textContent =
    `Question ${state.questionIdx + 1} / ${QUESTIONS_PER_GAME}`;
  document.getElementById('question-text').textContent = q.text;
  updateDifficultyDisplay();

  // Build answer buttons
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = q.choices.map((choice, i) => `
    <button class="answer-btn" onclick="submitAnswer('${escapeHtml(choice)}', this)">
      <div class="ans-shape">${SHAPES[i]}</div>
      <span>${choice}</span>
    </button>
  `).join('');

  startTimer();
}

function escapeHtml(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function updateDifficultyDisplay() {
  const labels = ['', 'Facile', 'Moyen', 'Difficile'];
  const colors = ['', 'var(--c3)', 'var(--c4)', 'var(--c1)'];
  let html = '';
  for (let i = 1; i <= 3; i++) {
    const active = i <= state.difficulty;
    html += `<div class="diff-star ${active ? 'active' : ''}" style="${active ? `color:${colors[state.difficulty]}` : 'color:rgba(255,255,255,0.2)'}">★</div>`;
  }
  html += `<div class="diff-label" style="color:${colors[state.difficulty]}">${labels[state.difficulty]}</div>`;
  document.getElementById('difficulty-display').innerHTML = html;
}

function startTimer() {
  const bar = document.getElementById('timer-bar');
  const num = document.getElementById('timer-number');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.classList.remove('urgent');
  num.classList.remove('urgent');

  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    const pct = (state.timeLeft / TIMER_MAX) * 100;
    bar.style.transition = 'width 0.25s linear';
    bar.style.width = pct + '%';
    num.textContent = state.timeLeft;

    if (state.timeLeft <= 3) {
      bar.classList.add('urgent');
      num.classList.add('urgent');
    }

    if (state.timeLeft <= 0) {
      clearTimer();
      if (!state.answered) timeOut();
    }
  }, 1000);
}

function clearTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function timeOut() {
  state.answered = true;
  state.wrongCount++;
  state.streak = 0;

  // Show correct answer
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const text = btn.querySelector('span').textContent;
    if (text === state.currentQuestion.answer) btn.classList.add('correct');
    else btn.classList.add('wrong');
  });

  showFeedback(false, '⏰ Temps écoulé !', state.currentQuestion.answer);
  adaptDifficulty(false);
  updateStreak();

  setTimeout(() => {
    state.questionIdx++;
    loadQuestion();
  }, 2000);
}

function submitAnswer(choice, btnEl) {
  if (state.answered) return;
  state.answered = true;
  clearTimer();

  const correct = choice === state.currentQuestion.answer;
  const btns = document.querySelectorAll('.answer-btn');

  btns.forEach(btn => {
    btn.disabled = true;
    const text = btn.querySelector('span').textContent;
    if (text === state.currentQuestion.answer) btn.classList.add('correct');
    else if (btn === btnEl && !correct) btn.classList.add('wrong-chosen');
    else btn.classList.add('wrong');
  });

  if (correct) {
    state.correctCount++;
    state.streak++;
    state.maxStreak = Math.max(state.maxStreak, state.streak);
    const pts = state.difficulty * 10 + (state.streak > 1 ? 5 : 0);
    state.score += pts;
    document.getElementById('score-display').textContent = state.score;
    showPointsPopup('+' + pts);
    showFeedback(true, '✅ Bonne réponse !', null);
    if (state.streak >= 3) launchConfetti(5);
  } else {
    state.wrongCount++;
    state.streak = 0;
    showFeedback(false, '❌ Raté !', state.currentQuestion.answer);
  }

  adaptDifficulty(correct);
  updateStreak();

  setTimeout(() => {
    state.questionIdx++;
    loadQuestion();
  }, 2000);
}

function adaptDifficulty(correct) {
  if (correct && state.difficulty < 3) state.difficulty++;
  else if (!correct && state.difficulty > 1) state.difficulty--;
}

function updateStreak() {
  const el = document.getElementById('streak-display');
  if (state.streak >= 2) {
    el.textContent = `🔥 x${state.streak}`;
  } else {
    el.textContent = '';
  }
}

// ══════════════════════════════════════════════
// FEEDBACK
// ══════════════════════════════════════════════
function showFeedback(correct, msg, correctAnswer) {
  const toast = document.getElementById('feedback-toast');
  toast.className = 'feedback-toast';
  toast.innerHTML = correct
    ? `${msg}`
    : `${msg}${correctAnswer ? ` <span style="color:var(--c3)">${correctAnswer}</span>` : ''}`;
  toast.classList.add(correct ? 'correct-toast' : 'wrong-toast', 'show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function showPointsPopup(text) {
  const el = document.getElementById('points-popup');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}

// ══════════════════════════════════════════════
// END GAME
// ══════════════════════════════════════════════
function endGame() {
  clearTimer();

  saveToLeaderboard({
    name: state.player,
    score: state.score,
    category: state.category,
    date: new Date().toLocaleDateString('fr-FR')
  });

  // Emoji & rank message
  const accuracy = state.correctCount / QUESTIONS_PER_GAME;
  let emoji, message;
  if (accuracy >= 0.8) { emoji = '🏆'; message = 'Excellent ! Tu maîtrises ça !'; }
  else if (accuracy >= 0.6) { emoji = '🎉'; message = 'Bien joué ! Continue comme ça !'; }
  else if (accuracy >= 0.4) { emoji = '💪'; message = 'Pas mal, encore un effort !'; }
  else { emoji = '📚'; message = 'Courage, tu progresseras !'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').textContent = state.score;
  document.getElementById('res-correct').textContent = state.correctCount;
  document.getElementById('res-wrong').textContent = state.wrongCount;
  document.getElementById('res-accuracy').textContent =
    Math.round((state.correctCount / QUESTIONS_PER_GAME) * 100) + '%';
  document.getElementById('rank-message').textContent = message;

  // Leaderboard
  const lb = getLeaderboard();
  document.getElementById('results-lb-rows').innerHTML =
    lb.slice(0,8).map((e,i) => renderLbRow(e,i)).join('');

  showScreen('screen-results');

  if (accuracy >= 0.6) launchConfetti(20);
}

// ══════════════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════════════
function launchConfetti(intensity = 15) {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#ff3860','#3273dc','#23d160','#ffdd57','#ff6b35','#a855f7'];
  const pieces = [];

  for (let i = 0; i < intensity * 8; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -10,
      r: Math.random() * 8 + 4,
      d: Math.random() * intensity,
      color: colors[Math.floor(Math.random() * colors.length)],
      tilt: Math.random() * 10 - 10,
      tiltAngle: 0,
      tiltSpeed: Math.random() * 0.1 + 0.05
    });
  }

  let frame = 0;
  const angle = 0.01;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.tiltAngle += p.tiltSpeed;
      p.y += Math.cos(angle + p.d) + 2 + p.r / 2;
      p.x += Math.sin(angle) * 2;
      p.tilt = Math.sin(p.tiltAngle) * 15;

      ctx.beginPath();
      ctx.lineWidth = p.r / 2;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r / 4, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 4);
      ctx.stroke();
    });

    frame++;
    if (frame < 120) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ══════════════════════════════════════════════
// BACKGROUND PARTICLES
// ══════════════════════════════════════════════
function initParticles() {
  const wrap = document.getElementById('particles');
  const colors = ['#ff3860','#3273dc','#23d160','#ffdd57','#a855f7','#ff6b35'];

  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 30 + 8;
    const left = Math.random() * 100;
    const duration = Math.random() * 20 + 15;
    const delay = -(Math.random() * 25);
    const color = colors[Math.floor(Math.random() * colors.length)];

    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}%;
      background:${color};
      animation-duration:${duration}s;
      animation-delay:${delay}s;
    `;
    wrap.appendChild(p);
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
initParticles();
showLeaderboard();

// Enter key on name input
document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') goToCategories();
});
document.getElementById('player-name').addEventListener('input', e => {
  e.target.style.borderColor = '';
});

// Handle resize for confetti canvas
window.addEventListener('resize', () => {
  const c = document.getElementById('confetti-canvas');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
});
</script>
